<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berk Can Ucar</title>
    <meta name="description" content="Persönliche Website von Berk Can Ucar">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%233b82f6'/><text x='50' y='68' font-family='Arial' font-size='50' font-weight='bold' fill='white' text-anchor='middle'>BC</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .landing {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .landing-name {
            font-size: clamp(2.5rem, 9vw, 5.5rem);
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: -0.02em;
        }
        .landing-name .accent {
            color: var(--accent-primary);
        }
        .landing-contact {
            margin-top: 2.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.9rem 2.2rem;
            font-size: 1.05rem;
            font-weight: 600;
            color: #fff;
            border-radius: 999px;
            background: var(--gradient-primary);
            box-shadow: 0 8px 24px var(--accent-glow);
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
        }
        .landing-contact:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px var(--accent-glow);
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="bg-gradient"></div>
        <div class="bg-grid"></div>
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </div>

    <main class="landing">
        <h1 class="landing-name">
            Berk Can <span class="accent">Ucar</span>
        </h1>
        <a class="landing-contact" id="contactBtn" href="#">
            <span>✉</span>
            <span>Kontakt</span>
        </a>
    </main>

    <script>
        // Simple email obfuscation against scrapers
        (function () {
            var user = 'berkcanucar';
            var domain = 'gmx.de';
            var btn = document.getElementById('contactBtn');
            btn.setAttribute('href', 'mailto:' + user + '@' + domain);
        })();
    </script>
</body>
</html>
